<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evade The Dots</title>
<style>
    body { margin:0; overflow:hidden; background:#0b0f1a; font-family:Arial, sans-serif; color:white; }
    canvas { display:block; }
    #ui { position:absolute; top:10px; left:10px; font-size:18px; }
    #restartBtn {
        position:absolute;
        top:50%; left:50%;
        transform:translate(-50%, -50%);
        padding:12px 20px;
        font-size:18px;
        background:#00e0ff;
        border:none;
        border-radius:8px;
        cursor:pointer;
        display:none;
    }
</style>
</head>
<body>
<div id="ui">Time: 0</div>
<button id="restartBtn">Restart (Press R)</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, enemies, keys, time, gameOver;

function init() {
    player = { x: canvas.width/2, y: canvas.height/2, radius: 12, speed: 4 };
    enemies = [];
    keys = {};
    time = 0;
    gameOver = false;
    document.getElementById("restartBtn").style.display = "none";
}

init();

// Controls
document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (gameOver && (e.key === "r" || e.key === "R")) {
        init();
        gameLoop();
    }
});

document.addEventListener("keyup", e => keys[e.key] = false);

document.getElementById("restartBtn").onclick = () => {
    init();
    gameLoop();
};

function spawnEnemy() {
    if (gameOver) return;

    let side = Math.floor(Math.random()*4);
    let x, y;

    if (side === 0) { x = 0; y = Math.random()*canvas.height; }
    if (side === 1) { x = canvas.width; y = Math.random()*canvas.height; }
    if (side === 2) { x = Math.random()*canvas.width; y = 0; }
    if (side === 3) { x = Math.random()*canvas.width; y = canvas.height; }

    enemies.push({ x, y, radius: 10, speed: 1 + Math.random()*2 });
}

function movePlayer() {
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(player.radius, Math.min(canvas.width-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(canvas.height-player.radius, player.y));
}

function updateEnemies() {
    enemies.forEach(e => {
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        e.x += (dx/dist) * e.speed;
        e.y += (dy/dist) * e.speed;

        if (dist < player.radius + e.radius) {
            gameOver = true;
            document.getElementById("restartBtn").style.display = "block";
        }
    });
}

function drawPlayer() {
    ctx.fillStyle = "#00e0ff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
    ctx.fill();
}

function drawEnemies() {
    ctx.fillStyle = "#ff3b3b";
    enemies.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawGrid() {
    ctx.strokeStyle = "#1c2233";
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
}

function gameLoop() {
    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over", canvas.width/2 - 110, canvas.height/2 - 20);
        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid();

    movePlayer();
    updateEnemies();

    drawPlayer();
    drawEnemies();

    time += 1/60;
    document.getElementById("ui").textContent = "Time: " + time.toFixed(1);

    requestAnimationFrame(gameLoop);
}

setInterval(spawnEnemy, 800);

gameLoop();
</script>
</body>
</html>
